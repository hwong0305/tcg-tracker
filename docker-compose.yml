services:
  postgres:
    image: postgres:16
    container_name: cardtracker-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cardtracker
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d cardtracker"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - cardtracker_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: cardtracker-api
    working_dir: /app
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cardtracker
      ONEPIECE_API_BASE_URL: https://optcg-api.com
      PRICECHARTING_BASE_URL: https://www.pricecharting.com
    depends_on:
      postgres:
        condition: service_healthy
    command: ["sh", "scripts/api-entrypoint.sh"]
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: cardtracker-web
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - api
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules

volumes:
  cardtracker_pgdata:
